# ============================================================================
# Franchise Registry — Content Database for Lore/Facts "Did You Know?" Channel
# ============================================================================
# This file defines the structure for all franchises the system can create
# content about. Each franchise entry provides everything the pipeline needs:
# topic seeds, visual style direction, character references (abstract, non-copyrighted),
# and content safety notes.
#
# The system randomly selects a franchise → picks a topic seed → generates a script
# → generates visuals matching that franchise's aesthetic → assembles the Short.
# ============================================================================

# ----------------------------------------------------------------------------
# GLOBAL SETTINGS
# ----------------------------------------------------------------------------
registry:
  version: "1.0"
  
  # Content pool categories — the system balances content across these
  categories:
    - id: "gaming"
      label: "Video Games"
      weight: 0.5                            # 50% of videos from gaming
    - id: "anime_manga"
      label: "Anime & Manga"
      weight: 0.5                            # 50% from anime/manga
    # Future:
    # - id: "movies"
    #   label: "Movies & TV"
    #   weight: 0.0
  
  # Rotation rules — avoid covering the same franchise too often
  rotation:
    min_gap_between_same_franchise: 5        # At least 5 other videos before repeating a franchise
    min_gap_between_same_category: 2         # Don't do 3+ gaming videos in a row
    max_same_franchise_per_week: 2           # No franchise appears more than twice per week
    
  # Topic tracking — to avoid repeating the same fact
  topic_history_db: "{storage.base_path}/topic_history.db"


# ----------------------------------------------------------------------------
# FRANCHISE ENTRIES — GAMING
# ----------------------------------------------------------------------------
franchises:

  # === RESIDENT EVIL ===
  - id: "resident_evil"
    name: "Resident Evil"
    category: "gaming"
    active: true
    
    # ---- Narrator Configuration ----
    # The narrator is a character who speaks in-character, facing the camera.
    # User selects the default narrator; can be overridden per topic.
    narrator:
      default_archetype_id: "resourceful_agent"  # Jill — user-selected
      # The narrator speaks AS this character. Script tone matches their personality.
      # Other characters appear as "action characters" in the background/cutaways.
      
      # Narrator personality guides — used by LLM to write in-character dialogue
      # Voice settings — used by Chatterbox to clone and style the voice
      narrator_personalities:
        resourceful_agent:                      # Jill as narrator
          tone: "casual, witty, slightly sarcastic, amused by the absurdity"
          speech_style: "speaks like she's sharing gossip with a friend"
          example_line: "Did you know? Chris was not supposed to be this buffed. Like, at all."
          refers_to_others_as:
            bio_soldier: "Chris, my partner, that guy"
            enigmatic_villain: "Wesker, our former captain, that traitor"
          voice_settings:
            reference_audio: "assets/library/resident_evil/characters/resourceful_agent/voice/reference.wav"
            reference_source: "RE1 Remake cutscene — Jill solo dialogue, clean extraction"
            voice_status: "pending"             # pending | extracted | approved
            
            # Provider-specific tuning (used based on active_provider in config)
            chatterbox:
              exaggeration: 0.5                 # Medium-high — casual and expressive
              cfg_weight: 0.5
              speed_factor: 1.0
            elevenlabs:
              stability: 0.4                    # Lower = more expressive
              similarity_boost: 0.75            # How close to reference voice
              style: 0.5                        # Moderate style exaggeration
            
        enigmatic_villain:                      # Wesker as narrator
          tone: "cold, superior, condescending, intellectually amused"
          speech_style: "speaks like he's explaining something obvious to inferiors"
          example_line: "Did you know? That fool's absurd physique was never part of the original design."
          refers_to_others_as:
            bio_soldier: "Chris, that fool, the brute"
            resourceful_agent: "Jill, Valentine, her"
          voice_settings:
            reference_audio: "assets/library/resident_evil/characters/enigmatic_villain/voice/reference.wav"
            reference_source: "RE5 cutscene — Wesker monologue, clean extraction"
            voice_status: "pending"
            
            chatterbox:
              exaggeration: 0.2                 # Low — cold and controlled
              cfg_weight: 0.7
              speed_factor: 0.95                # Slightly slower, deliberate
            elevenlabs:
              stability: 0.7                    # Higher = more controlled, cold
              similarity_boost: 0.8
              style: 0.2                        # Minimal style — monotone authority
            
        bio_soldier:                            # Chris as narrator
          tone: "earnest, straightforward, slightly self-deprecating"
          speech_style: "speaks like a soldier telling war stories to a buddy"
          example_line: "Did you know? They originally designed me way leaner. Yeah, things... changed."
          refers_to_others_as:
            resourceful_agent: "Jill, my partner, her"
            enigmatic_villain: "Wesker, that bastard, him"
          voice_settings:
            reference_audio: "assets/library/resident_evil/characters/bio_soldier/voice/reference.wav"
            reference_source: "RE5 cutscene — Chris dialogue, clean extraction"
            voice_status: "pending"
            
            chatterbox:
              exaggeration: 0.4                 # Moderate — earnest but not flat
              cfg_weight: 0.5
              speed_factor: 1.05                # Slightly faster, energetic
            elevenlabs:
              stability: 0.5                    # Balanced
              similarity_boost: 0.75
              style: 0.4                        # Moderate style — earnest energy
    
    # Audio profile — determines music mood, SFX style, and ambient sounds
    audio_profile:
      music_mood: "dark_cinematic"            # Matches folder: assets/audio/music/dark_cinematic/
      music_energy: "low_medium"              # low, low_medium, medium, high
      sfx_style: "horror_dramatic"            # Influences SFX selection (deeper impacts, eerie reveals)
      ambient_loop: "rain_loop.wav"           # Optional atmosphere layer
      ambient_enabled: true
    
    # Visual style guide for AI image generation
    # IMPORTANT: Never mention actual character names in AI prompts
    visual_style:
      aesthetic: "cinematic horror, dark industrial environments, bio-organic mutations"
      color_palette: "desaturated greens, dark reds, cold steel blues, shadow-heavy"
      style_prompt_suffix: "survival horror atmosphere, photorealistic, cinematic lighting, 9:16 vertical"
    
    # ---- Persistent Environments (generated once in Phase 1, reused forever) ----
    environments:
      - env_id: "mansion_foyer"
        description: "Grand Victorian mansion foyer with marble checkered floor, ornate wooden staircase, chandelier, gothic balustrades"
        model_dir: "assets/library/resident_evil/environments/mansion_foyer/"
        reference_status: "pending"
        
      - env_id: "underground_lab"
        description: "Underground research laboratory with containment pods, flickering fluorescent lights, metal grating floors, biohazard signs"
        model_dir: "assets/library/resident_evil/environments/underground_lab/"
        reference_status: "pending"
        
      - env_id: "police_station"
        description: "Abandoned ornate police station with gothic architecture, grand hall with statue, boarded windows, scattered papers"
        model_dir: "assets/library/resident_evil/environments/police_station/"
        reference_status: "pending"
        
      - env_id: "city_streets"
        description: "Overrun city streets at night, emergency lights, abandoned cars, broken storefronts, fog and distant fires"
        model_dir: "assets/library/resident_evil/environments/city_streets/"
        reference_status: "pending"
        
      - env_id: "mansion_hallway"
        description: "Dimly lit Victorian mansion hallway with stone walls, wooden weapon racks, wall-mounted torches, dusty atmosphere"
        model_dir: "assets/library/resident_evil/environments/mansion_hallway/"
        reference_status: "pending"
    
    # ---- Persistent Props (generated once, reused as overlays or scene elements) ----
    props:
      - prop_id: "green_herb"
        description: "A green medicinal herb plant in a small pot, glowing slightly"
        model_dir: "assets/library/resident_evil/props/green_herb/"
        reference_status: "pending"
        
      - prop_id: "typewriter"
        description: "Old typewriter on a wooden desk with an ink ribbon and save sheet"
        model_dir: "assets/library/resident_evil/props/typewriter/"
        reference_status: "pending"
    
    # ---- Character Archetypes ----
    # Abstract character archetypes — NEVER use real character names in AI prompts
    # (AI tools like Google Flow block copyrighted names in text prompts)
    # However, DO use source reference images uploaded alongside the text prompt.
    # This dramatically improves accuracy without triggering content filters.
    # Each archetype has a persistent design: once the base reference is generated,
    # it's stored and reused as the anchor for all future appearances.
    character_archetypes:
      - archetype_id: "bio_soldier"
        visual_description: "muscular figure in tactical gear, determined expression, short dark hair, holstered weapon"
        # Inspired by: Chris Redfield (but never named in prompts)
        
        # Source reference images — used ONLY during initial character generation
        # These are screenshots/official art uploaded to the AI tool as visual anchors.
        # They guide the AI toward the right look without needing to name the character.
        # NOT included in the final published video — only used as generation input.
        source_references:
          - path: "assets/source_refs/resident_evil/chris_ref_01.jpg"
          - path: "assets/source_refs/resident_evil/chris_ref_02.jpg"
          notes: "Use RE5/RE6 muscular version for the 'steroid meme' accuracy"
        
        # Character Bible — reusable identity block included in every prompt
        character_bible: >
          Male, early 30s, muscular athletic build, square jawline, short cropped
          dark brown hair, brown eyes, light stubble. Wears olive-green tactical vest
          over black compression shirt, military cargo pants, fingerless gloves.
          Scar across right cheekbone. Expression defaults to focused and determined.
        
        # Persisted model sheet — generated ONCE in Phase 1, reused forever
        # Storage: assets/characters/{franchise_id}/{archetype_id}/
        model_dir: "assets/characters/resident_evil/bio_soldier/"
        # Contents after Phase 1 approval:
        #   portrait.png      — face lock
        #   full_body.png     — outfit + proportions lock
        #   expressions/      — optional emotion variants
        #   metadata.json     — status, creation date, prompts used
        reference_status: "pending"          # pending | generated | approved
        
      - archetype_id: "resourceful_agent"
        visual_description: "athletic woman with auburn hair in a blue tactical outfit, confident stance"
        # Inspired by: Jill Valentine
        character_bible: >
          Female, late 20s, athletic build, heart-shaped face, auburn shoulder-length
          hair often tucked behind ears, blue-grey eyes, fair skin. Wears blue tactical
          tube top with shoulder armor, dark fitted pants, combat boots. Carries herself
          with calm confidence. Expression defaults to alert and composed.
        model_dir: "assets/characters/resident_evil/resourceful_agent/"
        reference_status: "pending"
        
        # Narrator-specific assets (only needed for characters who narrate)
        # These are ADDITIONAL to the standard portrait/full_body/expressions
        is_narrator: true
        narrator_assets:
          # Front-facing "talking to camera" pose — the hero image for lip sync
          # Must have: clear face, visible mouth, direct eye contact with camera
          # This is what Kling uses as the base for lip sync animation
          front_facing: "assets/characters/resident_evil/resourceful_agent/narrator/front_facing.png"
          # Variants for visual variety across scenes
          front_gesturing: "assets/characters/resident_evil/resourceful_agent/narrator/front_gesturing.png"
          front_amused: "assets/characters/resident_evil/resourceful_agent/narrator/front_amused.png"
          narrator_status: "pending"   # pending | generated | approved
        
      - archetype_id: "towering_pursuer"
        visual_description: "massive humanoid figure in a dark leather trench coat, scarred and stitched face, industrial horror"
        # Inspired by: Nemesis
        character_bible: >
          Massive humanoid, 8+ feet tall, grotesquely muscular. Face heavily scarred
          and stitched, exposed teeth on one side, single functioning eye. Wears a
          full-length dark leather trench coat, industrial tubes and restraints visible.
          Skin is grey-purple, textured. Posture is hunched but imposing.
        model_dir: "assets/characters/resident_evil/towering_pursuer/"
        reference_status: "pending"
        
      - archetype_id: "enigmatic_villain"
        visual_description: "tall man in a long dark coat and sunglasses, slicked-back blonde hair, cold expression"
        # Inspired by: Wesker
        character_bible: >
          Male, late 30s, tall and lean, sharp angular features, slicked-back platinum
          blonde hair, always wears dark wrap-around sunglasses. Black leather long coat
          over dark turtleneck. Pale skin, thin lips, perpetual subtle smirk. Moves with
          calculated precision. Expression defaults to cold superiority.
        model_dir: "assets/characters/resident_evil/enigmatic_villain/"
        reference_status: "pending"
    
    # Topic seeds — starting points for script generation
    topic_seeds:
      - "The original game was inspired by a specific Famicom game from the 80s"
      - "The mansion in the first game was redesigned multiple times during development"
      - "A major character was originally planned to be a villain in the sequel"
      - "The herbs system was based on real medicinal plant combinations"
      - "One of the most iconic enemies was a last-minute addition to the game"
      - "The voice acting in the original was intentionally kept campy"
      - "The save room music was designed using specific psychological principles"
      - "A scrapped concept for RE4 eventually became a completely different game"
      - "The T-virus was inspired by real-world virology research"
      - "The Spencer Mansion layout was based on an actual architectural style"
    
    # Content safety notes for this franchise
    content_notes:
      advertiser_risk: "low-medium"
      avoid_topics:
        - "detailed gore descriptions"
        - "graphic body horror specifics"
      safe_framing: "Focus on developer stories, design decisions, and lore connections rather than violent content"


